# ── SYNTRA Docker Compose ──────────────────────────────────────────────────────
# Runs three services: postgres, api (Express), web (nginx + React SPA)
# Copy .env.example → .env and fill in your values before starting.
# Start:   docker compose up -d --build
# Logs:    docker compose logs -f
# Stop:    docker compose down
#
# ── Network topology ──────────────────────────────────────────────────────────
#   private  (MTU 1400) : postgres <-> api   <─ isolated DB traffic (Hetzner fix)
#   web      (external) : api, web          <─ shared with Caddy reverse proxy
#
# The `web` network is the existing project network created by the deploy host
# (see deploy/docker-compose.web.yml). api and web attach to both `private` and
# `web`; postgres only attaches to `private`. This keeps DB off the proxy net.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: syntra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       syntra
      POSTGRES_USER:     syntra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntra -d syntra"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Database Migration (run once on first deploy, and after schema changes) ─
  # Usage: docker compose run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: syntra_migrate
    environment:
      DATABASE_URL: postgresql://syntra:${POSTGRES_PASSWORD}@postgres:5432/syntra
    networks:
      - private
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["migration"]

  # ── Express API Server ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: syntra_api
    restart: unless-stopped
    environment:
      NODE_ENV:             production
      PORT:                 8080
      DATABASE_URL:         postgresql://syntra:${POSTGRES_PASSWORD}@postgres:5432/syntra
      SESSION_SECRET:       ${SESSION_SECRET}

      # Public base URL — used to build password-reset links in emails.
      # Set this to your domain (e.g. https://app.example.com).
      # Without it, password-reset emails will contain a broken localhost URL.
      APP_BASE_URL:         ${APP_BASE_URL}

      # Contact form SMTP — used to forward landing-page enquiries.
      CONTACT_SMTP_HOST:    ${CONTACT_SMTP_HOST:-mail.cyberslide.net}
      CONTACT_SMTP_PORT:    ${CONTACT_SMTP_PORT:-587}
      CONTACT_SMTP_USER:    ${CONTACT_SMTP_USER:-support@madeat2am.in}
      CONTACT_SMTP_PASS:    ${CONTACT_SMTP_PASS}
      CONTACT_EMAIL_TO:     ${CONTACT_EMAIL_TO:-chris@madeat2am.in}
      CONTACT_EMAIL_FROM:   ${CONTACT_EMAIL_FROM:-SYNTRA Enquiries <support@madeat2am.in>}

      # Optional — set to "debug" or "warn" to change log verbosity (default: info)
      LOG_LEVEL:            ${LOG_LEVEL:-info}

      # Optional — set to "false" only if your company SMTP server uses a
      # self-signed TLS certificate. Leave unset (or "true") in production.
      SMTP_REJECT_UNAUTHORIZED: ${SMTP_REJECT_UNAUTHORIZED:-true}

    networks:
      - private
      - web
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx + React SPA ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: syntra_web
    restart: unless-stopped
    # No host port mapping — Caddy reverse-proxies via the shared `web` network
    # (see /srv/caddy/sites/syntra.caddy on the host).
    networks:
      web:
        aliases:
          - syntra-app
      private:
        aliases:
          - syntra-app
    depends_on:
      api:
        condition: service_healthy

networks:
  # Private DB network — MTU 1400 to match Hetzner eth0 (fixes SMTP/TLS hangs)
  private:
    name: syntra_syntra-net
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
  # Public-facing network shared with the Caddy reverse proxy
  web:
    name: web
    external: true

volumes:
  postgres_data:
    driver: local
