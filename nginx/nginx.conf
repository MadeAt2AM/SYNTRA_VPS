server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Increase timeouts for API calls
    proxy_connect_timeout       60s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;

    # ── API proxy ──────────────────────────────────────────────────────────────
    # Forward all /api/* requests to the Express API server.
    # IMPORTANT: location blocks with `add_header` redefine the headers from
    # scratch — they do NOT inherit from server-level. So security headers
    # must be re-declared here.
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase body size limit for file uploads
        client_max_body_size 20M;

        # Security headers (defense in depth — the Express API also sets these
        # via the security-headers middleware).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP for API responses — only same-origin allowed; no inline/eval.
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    }

    # ── Static SPA ─────────────────────────────────────────────────────────────
    # Cache static assets aggressively
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;

        # Security headers on static assets too.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
    }

    # SPA fallback — all other routes serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;

        # Same headers on the SPA root document.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
    }

    # Gzip compression
    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
}